<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>社会福祉士 一問一答</title>
<style>
  :root {
    --primary: #1a5276;
    --primary-light: #2980b9;
    --primary-dark: #154360;
    --accent: #e67e22;
    --accent-light: #f39c12;
    --success: #27ae60;
    --success-light: #2ecc71;
    --danger: #e74c3c;
    --danger-light: #ec7063;
    --weak: #8e44ad;
    --weak-light: #9b59b6;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --border: #dde4ec;
    --shadow: 0 2px 12px rgba(0,0,0,0.10);
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: white;
    padding: 16px 20px 14px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
  .header .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .header-back {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.2); border: none; color: white;
    padding: 6px 12px; border-radius: 20px; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .header-back:active { background: rgba(255,255,255,0.3); }

  /* ===== SCROLLABLE CONTENT ===== */
  .content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
  }

  /* ===== CARDS ===== */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }

  /* ===== BUTTONS ===== */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 15px 18px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:active { background: var(--primary-dark); }
  .btn-success { background: var(--success); color: white; }
  .btn-success:active { background: #219150; }
  .btn-weak { background: var(--weak); color: white; }
  .btn-weak:active { background: #7d3c98; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:active { background: #ca6f1e; }
  .btn-outline {
    background: transparent;
    border: 2px solid var(--primary);
    color: var(--primary);
  }
  .btn-outline:active { background: #eaf2fb; }
  .btn-outline.selected { background: var(--primary); color: white; }
  .btn-sm {
    padding: 10px 14px;
    font-size: 14px;
    border-radius: var(--radius-sm);
  }
  .btn-correct { background: var(--success); color: white; }
  .btn-wrong { background: var(--danger); color: white; }

  .btn-group { display: flex; gap: 10px; }
  .btn-group .btn { flex: 1; }

  /* ===== HOME SCREEN ===== */
  .home-hero {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: white;
    padding: 32px 20px 28px;
    text-align: center;
  }
  .home-hero h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .home-hero p { font-size: 14px; opacity: 0.85; }
  .home-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius-sm);
    padding: 14px 8px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-card .val {
    font-size: 22px;
    font-weight: 800;
    color: var(--primary);
    line-height: 1;
  }
  .stat-card .lbl {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 4px;
  }
  .stat-card.weak-stat .val { color: var(--weak); }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin: 20px 0 10px;
  }
  .menu-btn {
    display: flex;
    align-items: center;
    padding: 16px;
    background: var(--card);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    border: none;
    width: 100%;
    text-align: left;
    cursor: pointer;
    margin-bottom: 10px;
    gap: 14px;
    transition: all 0.15s;
  }
  .menu-btn:active { transform: scale(0.97); }
  .menu-btn .icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .menu-btn .icon.all { background: #d6eaf8; }
  .menu-btn .icon.subject { background: #d5f5e3; }
  .menu-btn .icon.weak { background: #e8daef; }
  .menu-btn .icon.stats { background: #fdebd0; }
  .menu-btn .text .name { font-size: 16px; font-weight: 700; color: var(--text); }
  .menu-btn .text .desc { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .menu-btn .arrow { margin-left: auto; color: var(--text-light); font-size: 18px; }

  /* ===== SUBJECT SELECT ===== */
  .subject-list { display: flex; flex-direction: column; gap: 8px; }
  .subject-item {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    background: var(--card);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    border: none;
    width: 100%;
    text-align: left;
    cursor: pointer;
    gap: 12px;
    transition: all 0.15s;
  }
  .subject-item:active { transform: scale(0.97); }
  .subject-num {
    width: 30px; height: 30px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    flex-shrink: 0;
  }
  .subject-info { flex: 1; }
  .subject-name { font-size: 15px; font-weight: 600; }
  .subject-progress { font-size: 12px; color: var(--text-light); margin-top: 3px; }
  .subject-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 5px;
    overflow: hidden;
  }
  .subject-bar-fill {
    height: 100%;
    background: var(--success);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .subject-arrow { color: var(--text-light); }

  /* ===== ORDER SELECT ===== */
  .order-info {
    background: #eaf2fb;
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--primary);
    line-height: 1.6;
  }
  .order-info strong { font-weight: 700; }

  /* ===== QUIZ SCREEN ===== */
  .quiz-header-info {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: white;
    padding: 12px 16px;
  }
  .quiz-progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .quiz-progress-bar {
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%;
    background: white;
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .quiz-subject-tag {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    margin-bottom: 6px;
  }

  .question-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 18px;
    margin-bottom: 16px;
  }
  .question-number {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 12px;
    font-weight: 600;
  }
  .question-text {
    font-size: 17px;
    line-height: 1.7;
    font-weight: 500;
    color: var(--text);
  }

  .answer-area {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .answer-reveal-btn {
    width: 100%;
    padding: 18px;
    background: var(--primary-light);
    color: white;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .answer-reveal-btn:active { background: var(--primary); }
  .answer-content {
    padding: 20px 18px;
    display: none;
  }
  .answer-content.visible { display: block; }
  .answer-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .answer-text {
    font-size: 20px;
    font-weight: 800;
    color: var(--primary);
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .judge-buttons { display: flex; gap: 10px; }
  .judge-btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .judge-btn:active { transform: scale(0.96); }
  .judge-correct {
    background: linear-gradient(135deg, var(--success), var(--success-light));
    color: white;
  }
  .judge-wrong {
    background: linear-gradient(135deg, var(--danger), var(--danger-light));
    color: white;
  }

  /* ===== RETRY BANNER ===== */
  .retry-banner {
    background: linear-gradient(135deg, #f39c12, #e67e22);
    color: white;
    padding: 12px 16px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    border-radius: var(--radius-sm);
  }

  /* ===== RESULTS SCREEN ===== */
  .result-hero {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: white;
    padding: 30px 20px;
    text-align: center;
  }
  .result-emoji { font-size: 52px; margin-bottom: 8px; }
  .result-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .result-subtitle { font-size: 14px; opacity: 0.85; }
  .result-score-ring {
    width: 120px; height: 120px;
    margin: 20px auto 10px;
    position: relative;
  }
  .result-score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .result-score-ring .score-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
    color: white;
    transform: none;
  }
  .result-score-ring .score-text span { font-size: 13px; font-weight: 400; opacity: 0.8; }
  .result-stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin: 16px 0;
  }
  .result-stat {
    background: var(--card);
    border-radius: var(--radius-sm);
    padding: 16px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .result-stat .val { font-size: 24px; font-weight: 800; }
  .result-stat .lbl { font-size: 12px; color: var(--text-light); margin-top: 3px; }
  .result-stat.correct .val { color: var(--success); }
  .result-stat.wrong .val { color: var(--danger); }
  .result-stat.total .val { color: var(--primary); }
  .result-stat.rate .val { color: var(--accent); }

  .wrong-list-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--danger);
    margin: 16px 0 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .wrong-item {
    background: var(--card);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--danger);
  }
  .wrong-item .wq { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .wrong-item .wa { font-size: 13px; color: var(--success); font-weight: 700; }
  .wrong-item .wa::before { content: "答え："; color: var(--text-light); font-weight: 400; }

  /* ===== STATS SCREEN ===== */
  .stats-total {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stats-subject-item {
    background: var(--card);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
  }
  .stats-subject-name { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .stats-bar-row { display: flex; align-items: center; gap: 10px; }
  .stats-bar {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .stats-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success), var(--success-light));
    border-radius: 4px;
    transition: width 0.4s;
  }
  .stats-rate { font-size: 13px; font-weight: 700; color: var(--success); min-width: 38px; text-align: right; }
  .stats-count { font-size: 11px; color: var(--text-light); margin-top: 4px; }

  /* ===== WEAK LIST ===== */
  .weak-item {
    background: var(--card);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--weak);
  }
  .weak-item .wsubject { font-size: 11px; color: var(--weak); font-weight: 700; margin-bottom: 4px; }
  .weak-item .wq { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .weak-item .wa { font-size: 13px; color: var(--primary); font-weight: 700; }
  .weak-item .wa::before { content: "答え："; color: var(--text-light); font-weight: 400; }
  .weak-badge {
    display: inline-flex;
    align-items: center;
    background: #f8e8ff;
    color: var(--weak);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 700;
    margin-top: 6px;
    gap: 4px;
  }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-light);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(44,62,80,0.92);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s, opacity 0.3s;
    opacity: 0;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ===== ANIMATIONS ===== */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate { animation: slideIn 0.25s ease; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  .pulse { animation: pulse 0.3s ease; }

  /* ===== CONFETTI ===== */
  .confetti-container {
    position: fixed; inset: 0; pointer-events: none; z-index: 998; overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ===== RESET BUTTON ===== */
  .danger-btn {
    background: transparent;
    border: 2px solid var(--danger);
    color: var(--danger);
    padding: 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-top: 12px;
  }
  .danger-btn:active { background: #fdeaea; }
</style>
</head>
<body>

<!-- ===== HOME SCREEN ===== -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <h1>社会福祉士 一問一答</h1>
    <p>全17科目 850問 ／ 国家試験対策</p>
  </div>
  <div class="content">
    <div class="home-stats">
      <div class="stat-card">
        <div class="val" id="stat-total-answered">0</div>
        <div class="lbl">解答数</div>
      </div>
      <div class="stat-card">
        <div class="val" id="stat-accuracy">—</div>
        <div class="lbl">正答率</div>
      </div>
      <div class="stat-card weak-stat">
        <div class="val" id="stat-weak-count">0</div>
        <div class="lbl">苦手問題</div>
      </div>
    </div>

    <div class="section-title">出題範囲を選ぶ</div>

    <button class="menu-btn" onclick="startAllSubjects()">
      <div class="icon all">📚</div>
      <div class="text">
        <div class="name">全科目から出題</div>
        <div class="desc">17科目 850問からランダム</div>
      </div>
      <div class="arrow">›</div>
    </button>

    <button class="menu-btn" onclick="showSubjectList()">
      <div class="icon subject">📖</div>
      <div class="text">
        <div class="name">科目を選んで出題</div>
        <div class="desc">17科目から選択して出題</div>
      </div>
      <div class="arrow">›</div>
    </button>

    <button class="menu-btn" id="btn-weak-mode" onclick="startWeakMode()">
      <div class="icon weak">⚠️</div>
      <div class="text">
        <div class="name">苦手問題を出題</div>
        <div class="desc" id="weak-desc">2回正解するまで出題される問題</div>
      </div>
      <div class="arrow">›</div>
    </button>

    <button class="menu-btn" onclick="showStats()">
      <div class="icon stats">📊</div>
      <div class="text">
        <div class="name">成績・統計</div>
        <div class="desc">科目別の正答率を確認</div>
      </div>
      <div class="arrow">›</div>
    </button>
  </div>
</div>

<!-- ===== SUBJECT SELECT SCREEN ===== -->
<div id="screen-subjects" class="screen">
  <div class="header">
    <button class="header-back" onclick="showScreen('home')">‹ 戻る</button>
    <h1>科目を選択</h1>
  </div>
  <div class="content">
    <div class="subject-list" id="subject-list"></div>
  </div>
</div>

<!-- ===== ORDER SELECT SCREEN ===== -->
<div id="screen-order" class="screen">
  <div class="header">
    <button class="header-back" id="order-back-btn" onclick="showScreen('subjects')">‹ 戻る</button>
    <h1 id="order-title">出題設定</h1>
  </div>
  <div class="content">
    <div class="order-info">
      <strong id="order-scope-name">全科目</strong> から出題します。<br>
      1回のクイズは <strong>10問</strong>。間違えた問題はセッション最後に再出題されます。
    </div>

    <div class="card">
      <div class="card-title">出題順序</div>
      <div class="btn-group">
        <button class="btn btn-outline selected" id="btn-random" onclick="selectOrder('random')">
          🔀 ランダム
        </button>
        <button class="btn btn-outline" id="btn-sequential" onclick="selectOrder('sequential')">
          📋 順番通り
        </button>
      </div>
    </div>

    <button class="btn btn-primary" style="font-size:17px;padding:18px;" onclick="startQuiz()">
      🚀 クイズ開始！
    </button>
  </div>
</div>

<!-- ===== QUIZ SCREEN ===== -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header-info">
    <div class="quiz-progress-row">
      <div id="quiz-subject-tag" class="quiz-subject-tag">医学概論</div>
      <div id="quiz-progress-text" style="font-size:13px;">1 / 10</div>
    </div>
    <div class="quiz-progress-bar">
      <div class="quiz-progress-fill" id="quiz-progress-fill" style="width:10%"></div>
    </div>
  </div>

  <div class="content" id="quiz-content">

":12,"q":"少年院と少年鑑別所の違いを述べよ","a":"少年院は処分（矯正教育）を行う施設；少年鑑別所は審判前の調査・観護を行う施設"},{"id":"s7_q12","subject":"刑事司法と福祉","subjectIndex":7,"num":13,"q":"刑事施設（刑務所・拘置所など）を所管する省庁はどこか？","a":"法務省（矯正局）"},{"id":"s7_q13","subject":"刑事司法と福祉","subjectIndex":7,"num":14,"q":"受刑者の釈放後の社会復帰を支援する「地域生活定着支援センター」は誰を主な対象とするか？","a":"高齢や障害のある受刑者・退所者（福祉的支援が必要な者）"},{"id":"s7_q14","subject":"刑事司法と福祉","subjectIndex":7,"num":15,"q":"「入口支援」とは何か？","a":"起訴猶予・不起訴段階から福祉支援につなぐ取り組み"},{"id":"s7_q15","subject":"刑事司法と福祉","subjectIndex":7,"num":16,"q":"「出口支援」とは何か？","a":"受刑者の釈放後（出所後）に福祉サービスにつなぐ取り組み"},{"id":"s7_q16","subject":"刑事司法と福祉","subjectIndex":7,"num":17,"q":"「社会内処遇」と「施設内処遇」の違いを述べよ","a":"社会内処遇は地域社会の中で処遇（保護観察等）；施設内処遇は施設に収容して処遇（刑務所等）"},{"id":"s7_q17","subject":"刑事司法と福祉","subjectIndex":7,"num":18,"q":"薬物依存症の回復支援施設として代表的なものを1つ挙げよ","a":"ダルク（DARC）"},{"id":"s7_q18","subject":"刑事司法と福祉","subjectIndex":7,"num":19,"q":"再犯防止推進法（2016年）の正式名称は？","a":"再犯の防止等の促進に関する法律"},{"id":"s7_q19","subject":"刑事司法と福祉","subjectIndex":7,"num":20,"q":"刑事司法における「ダイバージョン（転換）」とは何か？","a":"刑事手続きから外れ、福祉・医療等の支援に転換すること"},{"id":"s7_q20","subject":"刑事司法と福祉","subjectIndex":7,"num":21,"q":"「触法障害者」とは何を指すか？","a":"障害（知的・精神等）により刑事責任能力が問えない状態で触法行為を行った人"},{"id":"s7_q21","subject":"刑事司法と福祉","subjectIndex":7,"num":22,"q":"医療観察法（心神喪失者等医療観察法）の目的を述べよ","a":"心神喪失等で不起訴・無罪になった者に医療を提供し社会復帰を促進する"},{"id":"s7_q22","subject":"刑事司法と福祉","subjectIndex":7,"num":23,"q":"「保護観察」の対象者を2つ挙げよ","a":"仮釈放者・執行猶予者（他に少年院仮退院者・保護処分中の少年等）"},{"id":"s7_q23","subject":"刑事司法と福祉","subjectIndex":7,"num":24,"q":"自立更生促進センターとはどのような施設か？","a":"住居のない保護観察対象者を宿泊させながら就労支援等を行う国立の更生保護施設"},{"id":"s7_q24","subject":"刑事司法と福祉","subjectIndex":7,"num":25,"q":"「刑の一部執行猶予制度」とは何か？","a":"刑期の一部を実際に服役し残りを猶予する制度（薬物事犯等を対象）"},{"id":"s7_q25","subject":"刑事司法と福祉","subjectIndex":7,"num":26,"q":"ソーシャルワーカーが刑事司法の分野で担う役割を1つ述べよ","a":"被疑者・被告人・受刑者の社会復帰支援・福祉機関への橋渡し"},{"id":"s7_q26","subject":"刑事司法と福祉","subjectIndex":7,"num":27,"q":"「犯罪被害者等基本法」の目的を述べよ","a":"犯罪被害者等の権利利益の保護を図り、支援のための施策を推進する"},{"id":"s7_q27","subject":"刑事司法と福祉","subjectIndex":7,"num":28,"q":"犯罪被害者に対する経済的支援制度の名称は？","a":"犯罪被害者等給付金制度（犯罪被害給付制度）"},{"id":"s7_q28","subject":"刑事司法と福祉","subjectIndex":7,"num":29,"q":"「修復的司法（レストラティブ・ジャスティス）」とは何か？","a":"被害者・加害者・地域が対話し関係修復・被害回復を図るアプローチ"},{"id":"s7_q29","subject":"刑事司法と福祉","subjectIndex":7,"num":30,"q":"拘置所の主な収容対象者は誰か？","a":"未決拘禁者（起訴前後の被疑者・被告人）"},{"id":"s7_q30","subject":"刑事司法と福祉","subjectIndex":7,"num":31,"q":"少年非行の分類で「虞犯少年」とはどのような少年か？","a":"将来罪を犯すおそれがある少年（虞犯行為）"},{"id":"s7_q31","subject":"刑事司法と福祉","subjectIndex":7,"num":32,"q":"「触法少年」とは何か？","a":"14歳未満で刑罰法令に触れる行為をした少年（刑事責任は問えない）"},{"id":"s7_q32","subject":"刑事司法と福祉","subjectIndex":7,"num":33,"q":"「犯罪少年」とは何歳以上の少年か？","a":"14歳以上20歳未満で罪を犯した少年"},{"id":"s7_q33","subject":"刑事司法と福祉","subjectIndex":7,"num":34,"q":"「BBS（Big Brothers and Sisters Movement）会員」はどのような活動をするか？","a":"非行少年や生活上の困難を持つ子どもの兄・姉のような存在として支援するボランティア"},{"id":"s7_q34","subject":"刑事司法と福祉","subjectIndex":7,"num":35,"q":"社会復帰調整官の役割を述べよ","a":"医療観察法に基づく処遇対象者の地域社会への円滑な復帰を支援する国家公務員（保護観察所勤務）"},{"id":"s7_q35","subject":"刑事司法と福祉","subjectIndex":7,"num":36,"q":"「更生緊急保護」とは何か？","a":"釈放直後に緊急に保護が必要な場合に行う保護司・更生保護施設等による緊急的支援"},{"id":"s7_q36","subject":"刑事司法と福祉","subjectIndex":7,"num":37,"q":"「性犯罪者処遇プログラム」は誰が実施するか？","a":"刑務所内は矯正局；仮釈放後は保護観察所"},{"id":"s7_q37","subject":"刑事司法と福祉","subjectIndex":7,"num":38,"q":"「問題行動のある少年」に対する家裁の審判における「試験観察」とは何か？","a":"保護処分決定前に一定期間、調査・経過観察を行う措置"},{"id":"s7_q38","subject":"刑事司法と福祉","subjectIndex":7,"num":39,"q":"刑事訴訟法上、逮捕後の勾留期間の原則は何日間か？","a":"最長20日間（10日＋最大10日延長）"},{"id":"s7_q39","subject":"刑事司法と福祉","subjectIndex":7,"num":40,"q":"「恩赦」とはどのような制度か？","a":"国家が刑の全部または一部を免除・軽減する制度（内閣の助言と承認・天皇の認証による）"},{"id":"s7_q40","subject":"刑事司法と福祉","subjectIndex":7,"num":41,"q":"更生保護における「社会貢献活動」とはどのような活動か？","a":"保護観察対象者が公園清掃等の社会奉仕活動を行い社会性・責任感を養う取り組み"},{"id":"s7_q41","subject":"刑事司法と福祉","subjectIndex":7,"num":42,"q":"「刑事司法と福祉の連携」が強調される背景の一つを述べよ","a":"高齢・障害のある受刑者が福祉的支援なしでは再犯に至りやすいことが明らかになったため"},{"id":"s7_q42","subject":"刑事司法と福祉","subjectIndex":7,"num":43,"q":"少年院の種類を2つ挙げよ","a":"第1種（概ね12〜23歳）・第2種（犯罪傾向が進んだ16歳以上）等（全4種）"},{"id":"s7_q43","subject":"刑事司法と福祉","subjectIndex":7,"num":44,"q":"「ケアプログラム」（薬物依存離脱指導）を実施する刑事施設内の部門は？","a":"刑務所内の医療部門・社会復帰支援部門"},{"id":"s7_q44","subject":"刑事司法と福祉","subjectIndex":7,"num":45,"q":"「被害者参加制度」とはどのような制度か？","a":"一定の犯罪の被害者等が刑事裁判に参加し、被告人への質問や意見陳述ができる制度"},{"id":"s7_q45","subject":"刑事司法と福祉","subjectIndex":7,"num":46,"q":"「地域生活定着支援センター」の根拠は何か？","a":"高齢者・障害者が刑事司法から福祉へスムーズに移行できるよう設置（各都道府県）"},{"id":"s7_q46","subject":"刑事司法と福祉","subjectIndex":7,"num":47,"q":"「協力雇用主」とは何か？","a":"犯罪・非行の経歴を理解したうえで就労機会を提供する事業主"},{"id":"s7_q47","subject":"刑事司法と福祉","subjectIndex":7,"num":48,"q":"「出所者等の住宅確保困難問題」への対応策を1つ挙げよ","a":"更生保護施設・自立準備ホームへの入居、住宅確保給付金の活用等"},{"id":"s7_q48","subject":"刑事司法と福祉","subjectIndex":7,"num":49,"q":"更生保護制度の「自立準備ホーム」とは何か？","a":"NPO・社会福祉法人等が運営し釈放者・保護観察対象者に住居・食事を提供する施設"},{"id":"s8_q0","subject":"社会福祉調査の基礎","subjectIndex":8,"num":1,"q":"量的調査と質的調査の主な違いを述べよ","a":"量的調査は数値データを統計的に分析；質的調査は言語・観察データを解釈的に分析"},{"id":"s8_q1","subject":"社会福祉調査の基礎","subjectIndex":8,"num":2,"q":"仮説検証型の調査はどちらに当たるか？","a":"量的調査"},{"id":"s8_q2","subject":"社会福祉調査の基礎","subjectIndex":8,"num":3,"q":"グラウンデッド・セオリーは量的・質的どちらの方法か？","a":"質的調査（グラウンデッド・セオリー・アプローチ：GTA）"},{"id":"s8_q3","subject":"社会福祉調査の基礎","subjectIndex":8,"num":4,"q":"全数調査（悉皆調査）の意味を述べよ","a":"対象となる集団全員を調査すること（センサスとも呼ばれる）"},{"id":"s8_q4","subject":"社会福祉調査の基礎","subjectIndex":8,"num":5,"q":"標本調査とは何か？","a":"集団の一部を抽出（サンプリング）して調査し、全体を推測する方法"},{"id":"s8_q5","subject":"社会福祉調査の基礎","subjectIndex":8,"num":6,"q":"無作為抽出（ランダムサンプリング）の特徴を述べよ","a":"全ての対象が等しい確率で選ばれ、偏りのない標本を得やすい"},{"id":"s8_q6","subject":"社会福祉調査の基礎","subjectIndex":8,"num":7,"q":"層化抽出法とは何か？","a":"母集団をいくつかの層（グループ）に分け各層から無作為に抽出する方法"},{"id":"s8_q7","subject":"社会福祉調査の基礎","subjectIndex":8,"num":8,"q":"質問紙調査の「閉鎖型質問」とはどのような質問か？","a":"選択肢を示し、その中から回答を選ばせる質問形式"},{"id":"s8_q8","subject":"社会福祉調査の基礎","subjectIndex":8,"num":9,"q":"「開放型質問（自由記述）」の特徴を述べよ","a":"回答者が自由に回答を記述でき、多様な意見や理由を収集できる"},{"id":"s8_q9","subject":"社会福祉調査の基礎","subjectIndex":8,"num":10,"q":"「リッカート尺度」とはどのような尺度か？","a":"「非常に同意する〜全く同意しない」など態度・意見を段階的に測定する尺度"},{"id":"s8_q10","subject":"社会福祉調査の基礎","subjectIndex":8,"num":11,"q":"調査の「信頼性」とは何か？","a":"同じ条件で繰り返し測定した際に同じ結果が得られる一貫性"},{"id":"s8_q11","subject":"社会福祉調査の基礎","subjectIndex":8,"num":12,"q":"調査の「妥当性」とは何か？","a":"測定したいものを正確に測定できているかどうかの程度"},{"id":"s8_q12","subject":"社会福祉調査の基礎","subjectIndex":8,"num":13,"q":"「内的一貫性」は信頼性・妥当性のどちらを示すか？","a":"信頼性"},{"id":"s8_q13","subject":"社会福祉調査の基礎","subjectIndex":8,"num":14,"q":"「面接調査」の特徴（利点）を1つ述べよ","a":"回収率が高く、複雑な質問への詳細な回答が得られる"},{"id":"s8_q14","subject":"社会福祉調査の基礎","subjectIndex":8,"num":15,"q":"「郵送調査」の欠点を1つ挙げよ","a":"回収率が低い"},{"id":"s8_q15","subject":"社会福祉調査の基礎","subjectIndex":8,"num":16,"q":"「フォーカス・グループ・インタビュー」とはどのような調査手法か？","a":"複数人のグループで司会者の進行のもとに特定テーマについて議論する質的調査手法"},{"id":"s8_q16","subject":"社会福祉調査の基礎","subjectIndex":8,"num":17,"q":"「参与観察」とはどのような調査手法か？","a":"研究者が調査対象の集団・場所に入り込み、内部から観察する質的調査手法"},{"id":"s8_q17","subject":"社会福祉調査の基礎","subjectIndex":8,"num":18,"q":"「アクションリサーチ（実践研究）」とは何か？","a":"研究者と実践家が協働し、実践の改善を目指す研究手法"},{"id":"s8_q18","subject":"社会福祉調査の基礎","subjectIndex":8,"num":19,"q":"「二次分析」とはどのような調査か？","a":"既存のデータ・調査結果を再分析する方法"},{"id":"s8_q19","subject":"社会福祉調査の基礎","subjectIndex":8,"num":20,"q":"調査倫理における「インフォームド・コンセント」の意味を述べよ","a":"調査の目的・方法・リスクを説明し、対象者の自発的同意を得ること"},{"id":"s8_q20","subject":"社会福祉調査の基礎","subjectIndex":8,"num":21,"q":"調査倫理における「匿名性の保護」とは何か？","a":"対象者が特定されないよう個人情報を適切に管理・保護すること"},{"id":"s8_q21","subject":"社会福祉調査の基礎","subjectIndex":8,"num":22,"q":"「変数」の種類（尺度水準）を4つ挙げよ","a":"名義尺度・順序尺度・間隔尺度・比例（比率）尺度"},{"id":"s8_q22","subject":"社会福祉調査の基礎","subjectIndex":8,"num":23,"q":"名義尺度の例を1つ挙げよ","a":"性別・血液型・職業の分類など"},{"id":"s8_q23","subject":"社会福祉調査の基礎","subjectIndex":8,"num":24,"q":"「独立変数」と「従属変数」の違いを述べよ","a":"独立変数は原因・説明変数；従属変数は結果・被説明変数"},{"id":"s8_q24","subject":"社会福祉調査の基礎","subjectIndex":8,"num":25,"q":"「仮説」とはどのような命題か？","a":"検証可能な形で示された、変数間の関係についての予測的命題"},{"id":"s8_q25","subject":"社会福祉調査の基礎","subjectIndex":8,"num":26,"q":"「記述統計」と「推測統計」の違いを述べよ","a":"記述統計はデータの特徴を要約する；推測統計は標本から母集団を推定・検定する"},{"id":"s8_q26","subject":"社会福祉調査の基礎","subjectIndex":8,"num":27,"q":"平均値・中央値・最頻値の違いを述べよ","a":"平均値は算術平均；中央値はデータの中央；最頻値は最も頻度の高い値"},{"id":"s8_q27","subject":"社会福祉調査の基礎","subjectIndex":8,"num":28,"q":"「標準偏差」とは何を示すか？","a":"データが平均値からどれだけばらついているかを示す指標"},{"id":"s8_q28","subject":"社会福祉調査の基礎","subjectIndex":8,"num":29,"q":"「相関係数」が0に近い場合、2変数の関係はどのようなものか？","a":"ほとんど相関がない（無相関に近い）"},{"id":"s8_q29","subject":"社会福祉調査の基礎","subjectIndex":8,"num":30,"q":"「コーディング」とは質的調査で何をする作業か？","a":"テキストデータにラベル（コード）を付け分類・整理する作業"},{"id":"s8_q30","subject":"社会福祉調査の基礎","subjectIndex":8,"num":31,"q":"「トライアンギュレーション（三角測量法）」とは何か？","a":"複数の調査方法・データを組み合わせて結果の信頼性・妥当性を高める手法"},{"id":"s8_q31","subject":"社会福祉調査の基礎","subjectIndex":8,"num":32,"q":"「回答バイアス」の例を1つ挙げよ","a":"社会的望ましさバイアス（本音ではなく「望ましい」回答をしがちな傾向）"},{"id":"s8_q32","subject":"社会福祉調査の基礎","subjectIndex":8,"num":33,"q":"「系統的抽出法（等間隔抽出法）」とはどのような方法か？","a":"名簿等からk番目ごとに規則的に抽出する方法"},{"id":"s8_q33","subject":"社会福祉調査の基礎","subjectIndex":8,"num":34,"q":"スノーボールサンプリングとはどのような方法か？","a":"最初の対象者に次の対象者を紹介してもらう連鎖式抽出法（到達困難な集団の調査に有効）"},{"id":"s8_q34","subject":"社会福祉調査の基礎","subjectIndex":8,"num":35,"q":"「ライフヒストリー調査」とは何か？","a":"個人の生活史・体験の語りを記録・分析する質的調査手法"},{"id":"s8_q35","subject":"社会福祉調査の基礎","subjectIndex":8,"num":36,"q":"「内容分析（コンテンツ分析）」とは何か？","a":"テキスト・映像等のコミュニケーション内容を体系的・客観的に分析する手法"},{"id":"s8_q36","subject":"社会福祉調査の基礎","subjectIndex":8,"num":37,"q":"「モノグラフ（事例研究）」の特徴を述べよ","a":"特定の事例について深く記述・分析する研究手法"},{"id":"s8_q37","subject":"社会福祉調査の基礎","subjectIndex":8,"num":38,"q":"「パネル調査」と「コホート調査」の違いを述べよ","a":"パネル調査は同一対象者を繰り返し調査；コホート調査は同時期に同じ体験をした集団を追跡"},{"id":"s8_q38","subject":"社会福祉調査の基礎","subjectIndex":8,"num":39,"q":"「ランダム化比較試験（RCT）」は量的・質的どちらの研究デザインか？","a":"量的研究（実験的デザイン）"},{"id":"s8_q39","subject":"社会福祉調査の基礎","subjectIndex":8,"num":40,"q":"「研究倫理審査委員会（IRB）」の役割は？","a":"研究が倫理的基準を満たしているか審査し、対象者の権利・安全を守る機関"},{"id":"s8_q40","subject":"社会福祉調査の基礎","subjectIndex":8,"num":41,"q":"「GIS（地理情報システム）」を福祉調査に使う例を1つ挙げよ","a":"要援護者の分布地図の作成・福祉資源の偏在分析"},{"id":"s8_q41","subject":"社会福祉調査の基礎","subjectIndex":8,"num":42,"q":"「プリテスト（予備調査）」の目的は？","a":"質問紙の問 療と福祉","subjectIndex":15,"num":48,"q":"「健康格差」とはどのような格差か？","a":"社会経済的地位・地域・職業等の違いにより生じる健康状態の差"},{"id":"s15_q48","subject":"保健医療と福祉","subjectIndex":15,"num":49,"q":"「栄養ケア・ステーション」とはどのような機関か？","a":"地域の人々に管理栄養士が栄養相談・食事支援を提供する機関（都道府県栄養士会が設置）"},{"id":"s16_q0","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":1,"q":"IFSWによるソーシャルワークの定義（2014年）の冒頭を述べよ","a":"「ソーシャルワークは、社会変革と社会開発、社会的結束、および人々のエンパワメントと解放を促進する、実践に基づいた専門職であり学問である」"},{"id":"s16_q1","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":2,"q":"バイステックの7原則の「個別化」とは何か？","a":"クライエントを一人の独自な個人として捉え、画一的対応をしない原則"},{"id":"s16_q2","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":3,"q":"バイステックの7原則の「意図的な感情表出」とは何か？","a":"クライエントが感情を自由に表現できるよう意図的に促す原則"},{"id":"s16_q3","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":4,"q":"バイステックの7原則の「統制された情緒的関与」とは何か？","a":"ワーカーが自分の感情を意識的にコントロールしてクライエントに関わる原則"},{"id":"s16_q4","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":5,"q":"バイステックの7原則の「受容」とは何か？","a":"クライエントの言動・感情をあるがままに受け止め、価値ある存在として認める原則"},{"id":"s16_q5","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":6,"q":"バイステックの7原則の「非審判的態度」とは何か？","a":"クライエントの行動や態度を一方的に評価・批判しない原則"},{"id":"s16_q6","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":7,"q":"バイステックの7原則の「自己決定」とは何か？","a":"クライエント自身が選択・決定できるよう尊重し支援する原則"},{"id":"s16_q7","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":8,"q":"バイステックの7原則の「秘密保持」とは何か？","a":"クライエントから得た情報を守秘し、プライバシーを保護する原則"},{"id":"s16_q8","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":9,"q":"「社会福祉士」の資格の根拠となる法律は？","a":"社会福祉士及び介護福祉士法（1987年）"},{"id":"s16_q9","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":10,"q":"「精神保健福祉士」の資格の根拠法は？","a":"精神保健福祉士法（1997年）"},{"id":"s16_q10","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":11,"q":"「社会福祉士」の業務独占・名称独占の区別を述べよ","a":"名称独占（業務独占ではない）"},{"id":"s16_q11","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":12,"q":"「スーパービジョン」の3機能を挙げよ","a":"管理的機能・教育的機能・支持的機能"},{"id":"s16_q12","subject":"ソーシャルワークの基盤と専門職","subjectIndex":16,"num":13,"q":"「グループスーパービジョン」の特徴を述べよ","a":"複数のスーパーバイジーが参加し、事例共 // ===== STORAGE =====
const STORAGE_KEY = 'swquiz_v2';

function loadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    totalAnswered: 0,
    totalCorrect: 0,
    // subjectStats[si] = { answered: 0, correct: 0 }
    subjectStats: {},
    // weakMap[id] = { correctNeeded: 2 } // must answer correctly N more times to remove
    weakMap: {},
    // questionStats[id] = { answered: 0, correct: 0 }
    questionStats: {}
  };
}

function saveStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
  } catch(e) {}
}

let store = loadStorage();

// ===== STATE =====
let currentScope = null; // 'all', 'subject', 'weak'
let currentSubjectIndex = null;
let currentOrder = 'random';
let sessionQuestions = []; // 10 questions for this session
let currentQIndex = 0;
let sessionWrong = []; // wrong answers in first pass
let sessionCorrect = 0;
let sessionAnswered = 0;
let isRetrying = false; // in retry phase
let retryQueue = []; // questions to retry
let retryWrong = []; // still wrong in retry
let weakAddedCount = 0;

// ===== SCREEN =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const sc = document.getElementById('screen-' + id);
  sc.classList.add('active');
  sc.scrollTop = 0;
  if (id === 'home') updateHomeStats();
  if (id === 'stats') renderStats();
}

function updateHomeStats() {
  document.getElementById('stat-total-answered').textContent = store.totalAnswered;
  document.getElementById('stat-accuracy').textContent =
    store.totalAnswered > 0 ? Math.round(store.totalCorrect / store.totalAnswered * 100) + '%' : '—';
  const weakCount = Object.keys(store.weakMap).length;
  document.getElementById('stat-weak-count').textContent = weakCount;
  document.getElementById('weak-desc').textContent =
    weakCount > 0 ? weakCount + '問が苦手登録中' : '2回正解するまで出題される問題';
}

// ===== HOME ACTIONS =====
function startAllSubjects() {
  currentScope = 'all';
  currentSubjectIndex = null;
  document.getElementById('order-scope-name').textContent = '全科目（850問）';
  document.getElementById('order-title').textContent = '出題設定';
  document.getElementById('order-back-btn').onclick = () => showScreen('home');
  selectOrder('random');
  showScreen('order');
}

function showSubjectList() {
  renderSubjectList();
  showScreen('subjects');
}

function startWeakMode() {
  const weakIds = Object.keys(store.weakMap);
  if (weakIds.length === 0) {
    showToast('苦手問題がまだありません。クイズで問題を解きましょう！');
    return;
  }
  currentScope = 'weak';
  currentSubjectIndex = null;
  document.getElementById('order-scope-name').textContent = '苦手問題（' + weakIds.length + '問）';
  document.getElementById('order-title').textContent = '苦手問題 出題設定';
  document.getElementById('order-back-btn').onclick = () => showScreen('home');

}

function showStats() {
  showScreen('stats');
}

// ===== SUBJECT LIST =====
function renderSubjectList() {
  const list = document.getElementById('subject-list');
  list.innerHTML = '';
  QUIZ_DATA.subjects.forEach((name, si) => {
    const stats = store.subjectStats[si] || { answered: 0, correct: 0 };
    const total = QUIZ_DATA.questions.filter(q => q.subjectIndex === si).length;
    const rate = stats.answered > 0 ? Math.round(stats.correct / stats.answered * 100) : null;
    const pct = rate !== null ? rate : 0;

    const btn = document.createElement('button');
    btn.className = 'subject-item';
    btn.innerHTML = `
      <div class="subject-num">${si + 1}</div>
      <div class="subject-info">
        <div class="subject-name">${name}</div>
        <div class="subject-progress">
          ${stats.answered > 0 ? `解答 ${stats.answered}問 ／ 正答率 ${rate}%` : '未挑戦'}
        </div>
        <div class="subject-bar">
          <div class="subject-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="subject-arrow">›</div>
    `;
    btn.onclick = () => selectSubject(si, name);
    list.appendChild(btn);
  });
}

function selectSubject(si, name) {
  currentScope = 'subject';
  currentSubjectIndex = si;
  document.getElementById('order-scope-name').textContent = name + '（' +
    QUIZ_DATA.questions.filter(q => q.subjectIndex === si).length + '問）';
  document.getElementById('order-title').textContent = name;
  document.getElementById('order-back-btn').onclick = () => showScreen('subjects');
  selectOrder('random');
  showScreen('order');
}

// ===== ORDER SELECT =====
function selectOrder(order) {
  currentOrder = order;
  document.getElementById('btn-random').classList.toggle('selected', order === 'random');
  document.getElementById('btn-sequential').classList.toggle('selected', order === 'sequential');
}

// ===== QUIZ LOGIC =====
function buildQuestionPool() {
  let pool = [];
  if (currentScope === 'all') {
    pool = [...QUIZ_DATA.questions];
  } else if (currentScope === 'subject') {
    pool = QUIZ_DATA.questions.filter(q => q.subjectIndex === currentSubjectIndex);
  } else if (currentScope === 'weak') {
    const weakIds = new Set(Object.keys(store.weakMap));
    pool = QUIZ_DATA.questions.filter(q => weakIds.has(q.id));
  }
  return pool;
}

function startQuiz() {
  const pool = buildQuestionPool();
  if (pool.length === 0) {
    showToast('出題できる問題がありません');
    return;
  }

  sessionWrong = [];
  sessionCorrect = 0;
  sessionAnswered = 0;
  isRetrying = false;
  retryQueue = [];
  retryWrong = [];
  weakAddedCount = 0;
  currentQIndex = 0;

  if (currentOrder === 'random') {
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    sessionQuestions = shuffled.slice(0, 10);
  } else {
    sessionQuestions = pool.slice(0, 10);
  }

  showScreen('quiz');
  showQuestion();
}

function startAnotherQuiz() {
  startQuiz();
}

function showQuestion() {
  const q = isRetrying ? retryQueue[currentQIndex] : sessionQuestions[currentQIndex];
  const totalInPhase = isRetrying ? retryQueue.length : sessionQuestions.length;
  const totalQuestions = sessionQuestions.length + (retryQueue.length > 0 ? retryQueue.length : 0);

  // Progress
  let progressNum, progressTotal;
  if (!isRetrying) {
    progressNum = currentQIndex + 1;
    progressTotal = sessionQuestions.length + retryQueue.length;
  } else {
    progressNum = sessionQuestions.length + currentQIndex + 1;
    progressTotal = sessionQuestions.length + retryQueue.length;
  }
  const pct = Math.round(progressNum / Math.max(progressTotal, 1) * 100);

  document.getElementById('quiz-progress-text').textContent = progressNum + ' / ' + progressTotal;
  document.getElementById('quiz-progress-fill').style.width = pct + '%';
  document.getElementById('quiz-subject-tag').textContent = q.subject;

  document.getElementById('quiz-q-num').textContent = (isRetrying ? '🔁 再出題 ' : '') + '問題 ' + (currentQIndex + 1) + ' ／ ' + totalInPhase;
  document.getElementById('quiz-q-text').textContent = q.q;

  // Show/hide retry banner
  document.getElementById('retry-banner').style.display = isRetrying ? 'block' : 'none';

  // Hide answer
  document.getElementById('answer-content').classList.remove('visible');
  document.getElementById('reveal-btn').style.display = 'flex';

  // Animate
  const qcard = document.querySelector('.question-card');
  qcard.classList.remove('animate');
  void qcard.offsetWidth;
  qcard.classList.add('animate');
}

function revealAnswer() {
  const q = isRetrying ? retryQueue[currentQIndex] : sessionQuestions[currentQIndex];
  document.getElementById('quiz-a-text').textContent = q.a;
  document.getElementById('answer-content').classList.add('visible');
  document.getElementById('reveal-btn').style.display = 'none';
}

function judgeAnswer(isCorrect) {
  const q = isRetrying ? retryQueue[currentQIndex] : sessionQuestions[currentQIndex];

  sessionAnswered++;
  if (isCorrect) sessionCorrect++;

  // Update global stats
  store.totalAnswered++;
  if (isCorrect) store.totalCorrect++;

  // Update subject stats
  const si = q.subjectIndex;
  if (!store.subjectStats[si]) store.subjectStats[si] = { answered: 0, correct: 0 };
  store.subjectStats[si].answered++;
  if (isCorrect) store.subjectStats[si].correct++;

  // Update question stats
  if (!store.questionStats[q.id]) store.questionStats[q.id] = { answered: 0, correct: 0 };
  store.questionStats[q.id].answered++;
  if (isCorrect) store.questionStats[q.id].correct++;

  // Weak question logic
  if (!isCorrect) {
    // Wrong: add/update weak
    if (!store.weakMap[q.id]) {
      store.weakMap[q.id] = { correctNeeded: 2 };
      weakAddedCount++;
    } else {
      // Reset progress if wrong again
      store.weakMap[q.id].correctNeeded = 2;
    }
    if (!isRetrying) sessionWrong.push(q);
    else retryWrong.push(q);
  } else {
    // Correct: progress weak question
    if (store.weakMap[q.id]) {
      store.weakMap[q.id].correctNeeded--;
      if (store.weakMap[q.id].correctNeeded <= 0) {
        delete store.weakMap[q.id];
        showToast('✅ 苦手問題をクリア！');
      }
    }
  }

  saveStorage();

  // Next question
  currentQIndex++;
  const phase = isRetrying ? retryQueue : sessionQuestions;
  if (currentQIndex < phase.length) {
    showQuestion();
  } else {
    // Phase complete
    if (!isRetrying && sessionWrong.length > 0) {
      // Enter retry phase
      isRetrying = true;
      retryQueue = [...sessionWrong];
      currentQIndex = 0;
      showQuestion();
    } else {
      // All done
      showResults();
    }
  }
}

// ===== RESULTS =====
function showResults() {
  const allWrong = [...sessionWrong, ...retryWrong];
  // Deduplicate
  const seenIds = new Set();
  const uniqueWrong = allWrong.filter(q => {
    if (seenIds.has(q.id)) return false;
    seenIds.add(q.id);
    return true;
  });

  const totalAsked = sessionAnswered;
  const rate = totalAsked > 0 ? Math.round(sessionCorrect / totalAsked * 100) : 0;

  // Set emoji
  let emoji = '🎉';
  if (rate === 100) emoji = '🏆';
  else if (rate >= 80) emoji = '🎉';
  else if (rate >= 60) emoji = '😊';
  else if (rate >= 40) emoji = '🤔';
  else emoji = '💪';

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = rate === 100 ? '完璧！' : 'お疲れ様でした！';
  document.getElementById('result-subtitle').textContent = sessionQuestions.length + '問クイズ完了';
  document.getElementById('result-pct').textContent = rate + '%';
  document.getElementById('res-total').textContent = sessionQuestions.length;
  document.getElementById('res-correct').textContent = sessionCorrect;
  document.getElementById('res-wrong').textContent = uniqueWrong.length;
  document.getElementById('res-weak-added').textContent = weakAddedCount;

  // Ring animation
  const circumference = 2 * Math.PI * 52; // 326.7
  const offset = circumference - (rate / 100 * circumference);
  setTimeout(() => {
    document.getElementById('result-ring-fill').style.strokeDashoffset = offset;
  }, 300);

  // Wrong list
  const wrongSection = document.getElementById('wrong-list-section');
  const wrongList = document.getElementById('wrong-list');
  wrongList.innerHTML = '';
  if (uniqueWrong.length > 0) {
    wrongSection.style.display = 'block';
    uniqueWrong.forEach(q => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `<div class="wq">${q.q}</div><div class="wa">${q.a}</div>`;
      wrongList.appendChild(div);
    });
  } else {
    wrongSection.style.display = 'none';
  }

  showScreen('results');

  if (rate === 100) showConfetti();
}

// ===== STATS =====
function renderStats() {
  // Total cards
  const totalCards = document.getElementById('stats-total-cards');
  const rate = store.totalAnswered > 0 ? Math.round(store.totalCorrect / store.totalAnswered * 100) : 0;
  const weakCount = Object.keys(store.weakMap).length;
  totalCards.innerHTML = `
    <div class="stat-card"><div class="val">${store.totalAnswered}</div><div class="lbl">総解答数</div></div>
    <div class="stat-card"><div class="val" style="color:var(--success)">${rate}%</div><div class="lbl">総正答率</div></div>
    <div class="stat-card weak-stat"><div class="val">${weakCount}</div><div class="lbl">苦手問題</div></div>
  `;

  // Subject list
  const subjList = document.getElementById('stats-subject-list');
  subjList.innerHTML = '';
  QUIZ_DATA.subjects.forEach((name, si) => {
    const stats = store.subjectStats[si] || { answered: 0, correct: 0 };
    const r = stats.answered > 0 ? Math.round(stats.correct / stats.answered * 100) : 0;
    const div = document.createElement('div');
    div.className = 'stats-subject-item';
    div.innerHTML = `
      <div class="stats-subject-name">${si + 1}. ${name}</div>
      <div class="stats-bar-row">
        <div class="stats-bar"><div class="stats-bar-fill" style="width:${r}%"></div></div>
        <div class="stats-rate">${stats.answered > 0 ? r + '%' : '—'}</div>
      </div>
      <div class="stats-count">${stats.answered > 0 ? `${stats.answered}問解答 / ${stats.correct}問正解` : '未挑戦'}</div>
    `;
    subjList.appendChild(div);
  });

  // Weak list
  const weakList = document.getElementById('weak-question-list');
  weakList.innerHTML = '';
  const weakIds = Object.keys(store.weakMap);
  if (weakIds.length === 0) {
    weakList.innerHTML = `<div class="empty-state"><div class="emoji">✅</div><p>苦手問題はありません</p></div>`;
  } else {
    weakIds.forEach(id => {
      const q = QUIZ_DATA.questions.find(q => q.id === id);
      if (!q) return;
      const needed = store.weakMap[id].correctNeeded;
      const div = document.createElement('div');
      div.className = 'weak-item';
      div.innerHTML = `
        <div class="wsubject">${q.subject}</div>
        <div class="wq">${q.q}</div>
        <div class="wa">${q.a}</div>
        <div class="weak-badge">⚠️ あと${needed}回正解で解除</div>
      `;
      weakList.appendChild(div);
    });
  }
}

// ===== RESET =====
function confirmReset() {
  if (confirm('すべての学習データをリセットしますか？\n\nこの操作は取り消せません。')) {
    store = {
      totalAnswered: 0, totalCorrect: 0,
      subjectStats: {}, weakMap: {}, questionStats: {}
    };
    saveStorage();
    showToast('データをリセットしました');
    renderStats();
  }
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== CONFETTI =====
function showConfetti() {
  const colors = ['#f39c12','#27ae60','#2980b9','#e74c3c','#9b59b6','#1abc9c'];
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left: ${Math.random() * 100}%;
      top: -10px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      width: ${6 + Math.random() * 8}px;
      height: ${6 + Math.random() * 8}px;
      animation-duration: ${1.5 + Math.random() * 1.5}s;
      animation-delay: ${Math.random() * 0.5}s;
    `;
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 3500);
}

// ===== INIT =====
updateHomeStats();
</script>
